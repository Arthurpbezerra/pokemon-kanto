# Deploy para GitHub Pages a cada push em main.
# Publica o build no branch gh-pages. Em Settings → Pages use "Deploy from a branch" → gh-pages.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Build
        run: npx vite build --base=/${{ github.event.repository.name }}/
        env:
          # URL do servidor multiplayer (Render). Configure em Settings → Secrets → VITE_WS_URL
          VITE_WS_URL: ${{ secrets.VITE_WS_URL }}

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
