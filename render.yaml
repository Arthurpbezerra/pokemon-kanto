# Deploy do servidor multiplayer no Render (https://render.com)
# Depois, GitHub → Settings → Secrets → Actions: crie VITE_WS_URL com a URL do serviço

services:
  - type: web
    name: pokemon-kanto-server
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "20"
