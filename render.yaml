# Deploy do servidor multiplayer no Render (https://render.com)
# No Render: crie o serviço e em "Root Directory" (Build & Deploy) coloque: server
# Depois, GitHub → Settings → Secrets → Actions: crie VITE_WS_URL com a URL do serviço

services:
  - type: web
    name: pokemon-kanto-server
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "20"
